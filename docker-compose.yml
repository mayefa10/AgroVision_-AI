version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ia_colombia_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ia_colombia
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: ia_colombia_pgadmin
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'

  ai-service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: ia_colombia_ai
    restart: always
    ports:
      - '8000:8000'
    environment:
      - ENV=development
    volumes:
      - ./ai-services:/app
      - ./datasets:/app/datasets

volumes:
  postgres_data:
