services:
  postgres:
    image: postgres:16-alpine
    container_name: agrovision_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrovision
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrovision_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: agrovision_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - agrovision_net

  ai-service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: agrovision_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-services/.env.example
      
    environment:
      ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agrovision # ← agregar

    volumes:
      - ./datasets:/app/datasets
      - ./models:/app/models
    networks:
      - agrovision_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrovision_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agrovision
      JWT_SECRET: agrovision-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
    networks:
      - agrovision_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrovision_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: AgroVision AI
    networks:
      - agrovision_net
    volumes:
     - ./frontend/public:/app/public   # ← agregar esta línea  

volumes:
  postgres_data:
  
networks:
  agrovision_net:
    driver: bridge
