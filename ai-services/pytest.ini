[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov=services
    --cov-report=term-missing
    --cov-report=html:coverage_html

markers =
    unit: Tests unitarios sin I/O externo
    integration: Tests de integración con mocks de red
    e2e: Tests end-to-end contra APIs reales (requieren red)
