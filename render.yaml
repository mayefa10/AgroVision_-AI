# AgroVision AI — Render deployment configuration
services:

  # ── Backend NestJS ────────────────────────────────
  - type: web
    name: agrovision-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false   # ingresar manualmente: connection string de Neon
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AI_SERVICE_URL
        value: https://agrovision-ai.onrender.com
      - key: FRONTEND_URL
        value: https://agrovision-ai.vercel.app
    healthCheckPath: /health

  # ── AI Service FastAPI ────────────────────────────
  - type: web
    name: agrovision-ai
    runtime: docker
    dockerfilePath: ./ai-services/Dockerfile
    dockerContext: ./ai-services
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false   # ingresar manualmente: connection string de Neon
      - key: OPENWEATHER_API_KEY
        sync: false   # ingresar manualmente en el dashboard de Render
    healthCheckPath: /health